<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaker Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <img
      src="https://i.pravatar.cc/150?img=12"
      alt="Speaker"
      class="avatar"
    />

    <h1 class="name">Cherukuri Yogini</h1>

    <p class="title">Full stack developer</p>

    <p class="bio">
        Python developer and full stack developer and enthusiastic learner
    </p>

    <button class="btn">Follow</button>
  </div>

</body>
</html>
